<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX ULTRA v5 · Neural Multi-Asset Terminal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap');

:root {
  --void: #010409; --bg1: #0a0e14; --bg2: #0d1117; --panel: #161b22; --card: #21262d;
  --b0: #30363d; --b1: #484f58; --b2: #58a6ff33;
  --bull: #3fb950; --bull-glow: rgba(63, 185, 80, 0.4);
  --bear: #f85149; --bear-glow: rgba(248, 81, 73, 0.4);
  --gold: #d29922; --gold-glow: rgba(210, 153, 34, 0.4);
  --blue: #58a6ff; --blue-glow: rgba(88, 166, 255, 0.4);
  --purp: #bc8cff; --orange: #f0883e;
  --txt: #c9d1d9; --txt2: #8b949e; --txt3: #484f58;
  --hdr-h: 56px; --left-w: 280px; --right-w: 300px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--void); color: var(--txt); font-family: 'JetBrains Mono', monospace; font-size: 11px; }

/* SCANNER BACKGROUND */
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(circle at 2px 2px, rgba(88, 166, 255, 0.05) 1px, transparent 0);
  background-size: 40px 40px; pointer-events: none; z-index: 1;
}

#TOAST { position: fixed; bottom: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 8px; }
.toast-msg { 
  background: var(--panel); border: 1px solid var(--b1); padding: 10px 15px; border-radius: 4px; 
  font-size: 10px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
  animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); min-width: 240px;
}
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* HEADER */
#HDR { 
  position: fixed; top: 0; left: 0; right: 0; height: var(--hdr-h); 
  background: rgba(13, 17, 23, 0.9); border-bottom: 1px solid var(--b0); 
  display: flex; align-items: center; gap: 15px; padding: 0 20px; z-index: 500; backdrop-filter: blur(12px);
}
.logo-wrap { display: flex; flex-direction: column; }
.logo { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; letter-spacing: 2px; color: var(--blue); text-decoration: none; }
.logo span { color: var(--gold); }

#TICKER_WRAP { display: flex; gap: 10px; overflow-x: auto; flex: 1; scrollbar-width: none; align-items: center; }
.tick-pill { 
  background: var(--panel); border: 1px solid var(--b0); padding: 5px 12px; border-radius: 20px; 
  cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap;
}
.tick-pill:hover, .tick-pill.active { border-color: var(--blue); background: var(--b2); }
.tick-sym { font-weight: 700; font-size: 10px; }
.tick-pr { font-family: 'Orbitron', sans-serif; font-size: 11px; }

/* PANELS */
#LEFT, #RIGHT { position: fixed; top: var(--hdr-h); bottom: 0; background: var(--bg2); z-index: 100; display: flex; flex-direction: column; }
#LEFT { left: 0; width: var(--left-w); border-right: 1px solid var(--b0); }
#RIGHT { right: 0; width: var(--right-w); border-left: 1px solid var(--b0); }
.panel-hdr { padding: 12px 15px; font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2px; color: var(--txt2); background: var(--bg1); border-bottom: 1px solid var(--b0); text-transform: uppercase; }

/* OMNI-SNIPER DASHBOARD */
#SCANNER_HUB { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-bottom: 1px solid var(--b0); }
.scan-card { 
    background: var(--panel); border: 1px solid var(--b0); border-radius: 4px; padding: 8px; 
    display: flex; flex-direction: column; gap: 4px; transition: 0.3s;
}
.scan-card.active-sniping { border-color: var(--orange); box-shadow: 0 0 10px rgba(240, 136, 62, 0.2); }
.scan-card .sym { font-weight: 900; font-size: 10px; display: flex; justify-content: space-between; }
.scan-card .sig { font-family: 'Orbitron', sans-serif; font-size: 10px; }
.sig-buy { color: var(--bull); } .sig-sell { color: var(--bear); } .sig-neu { color: var(--txt3); }

/* MAIN CANVAS */
#MAIN_WRAP { position: fixed; inset: var(--hdr-h) var(--right-w) 0 var(--left-w); background: var(--void); overflow: hidden; }
canvas { display: block; }

/* FORM ELEMENTS */
input, select { 
  background: var(--bg1); border: 1px solid var(--b0); color: var(--txt); 
  padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 11px; outline: none; 
}
input:focus { border-color: var(--blue); }
button { 
  cursor: pointer; font-family: 'Orbitron', sans-serif; text-transform: uppercase; 
  letter-spacing: 1px; transition: 0.2s; border: none; border-radius: 4px;
}
.btn-primary { background: var(--blue); color: #000; font-weight: 700; padding: 10px; }
.btn-primary:hover { filter: brightness(1.2); }
.btn-outline { background: transparent; border: 1px solid var(--b1); color: var(--txt); padding: 5px 10px; }

/* AI AGENTS */
.agent-row { padding: 12px 15px; border-bottom: 1px solid var(--b0); }
.agent-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
.agent-name { font-weight: 700; color: var(--blue); font-size: 10px; }
.agent-vote { font-family: 'Orbitron', sans-serif; font-weight: 900; }
.agent-bar-bg { height: 4px; background: var(--b0); border-radius: 2px; overflow: hidden; }
.agent-bar-fill { height: 100%; transition: width 0.6s ease; }

/* MODALS */
.modal-overlay { 
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); 
  z-index: 2000; display: none; align-items: center; justify-content: center;
}
.modal { background: var(--bg2); border: 1px solid var(--b1); border-radius: 8px; width: 400px; padding: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }

</style>
</head>
<body>

<div id="HDR">
    <div class="logo-wrap">
        <a href="#" class="logo">APEX<span>ULTRA</span></a>
        <div style="font-size: 7px; color: var(--txt3); letter-spacing: 2px;">V5 NEURAL TERMINAL</div>
    </div>
    <div id="TICKER_WRAP">
        </div>
    <button class="btn-outline" onclick="toggleSettings()">⚙ SETTINGS</button>
    <button class="btn-primary" id="SNIPER_BTN" onclick="toggleOmniSniper()">🎯 START OMNI-SNIPER</button>
</div>

<div id="LEFT">
    <div class="panel-hdr">Neural Consensus</div>
    <div id="AGENTS_WRAP">
        <div class="agent-row" id="AG_MOM">
            <div class="agent-meta"><span class="agent-name">MOMENTUM_ENGINE</span><span class="agent-vote sig-neu">NEUTRAL</span></div>
            <div class="agent-bar-bg"><div class="agent-bar-fill" style="width: 50%; background: var(--txt3);"></div></div>
        </div>
        <div class="agent-row" id="AG_REV">
            <div class="agent-meta"><span class="agent-name">REVERSION_LOGIC</span><span class="agent-vote sig-neu">NEUTRAL</span></div>
            <div class="agent-bar-bg"><div class="agent-bar-fill" style="width: 50%; background: var(--txt3);"></div></div>
        </div>
        <div class="agent-row" id="AG_TRD">
            <div class="agent-meta"><span class="agent-name">TREND_REGIME</span><span class="agent-vote sig-neu">NEUTRAL</span></div>
            <div class="agent-bar-bg"><div class="agent-bar-fill" style="width: 50%; background: var(--txt3);"></div></div>
        </div>
    </div>
    
    <div class="panel-hdr">Omni-Scanner Hub</div>
    <div id="SCANNER_HUB">
        </div>

    <div style="margin-top: auto; padding: 15px; border-top: 1px solid var(--b0);">
        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px;">
            <span style="color: var(--txt2)">ALPACA STATUS</span>
            <span id="ALPACA_STATUS" style="color: var(--bear)">OFFLINE</span>
        </div>
        <button class="btn-outline" style="width: 100%" onclick="openAlpacaModal()">CONNECT ACCOUNT</button>
    </div>
</div>

<div id="MAIN_WRAP">
    <div id="CHART_LBL" style="position: absolute; top: 15px; left: 15px; z-index: 10; font-family: 'Orbitron'; font-size: 20px; font-weight: 900; pointer-events: none;">
        BTC/USD <span style="font-size: 12px; color: var(--txt2); font-weight: 400;">1m</span>
    </div>
    <canvas id="MAIN_CV"></canvas>
</div>

<div id="RIGHT">
    <div class="panel-hdr">Execution & Risk</div>
    <div style="padding: 15px; display: flex; flex-direction: column; gap: 12px;">
        <div>
            <label style="font-size: 8px; color: var(--txt3); display: block; margin-bottom: 4px;">RISK PER TRADE (%)</label>
            <input type="number" id="RISK_PCT" value="1.0" step="0.1" style="width: 100%">
        </div>
        <div>
            <label style="font-size: 8px; color: var(--txt3); display: block; margin-bottom: 4px;">MAX OPEN POSITIONS</label>
            <input type="number" id="MAX_POS" value="3" style="width: 100%">
        </div>
        <div style="display: flex; gap: 5px;">
            <button class="btn-primary" style="flex: 1; background: var(--bull);" onclick="manualOrder('buy')">BUY</button>
            <button class="btn-primary" style="flex: 1; background: var(--bear);" onclick="manualOrder('sell')">SELL</button>
        </div>
    </div>

    <div class="panel-hdr">Active Positions</div>
    <div id="POSITIONS_LIST" style="flex: 1; overflow-y: auto;">
        </div>
</div>

<div id="TOAST"></div>

<div class="modal-overlay" id="ALPACA_MOD">
    <div class="modal">
        <h2 style="font-family: 'Orbitron'; margin-bottom: 20px; font-size: 16px;">ALPACA CONFIG</h2>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <select id="ALP_MODE">
                <option value="paper">PAPER TRADING</option>
                <option value="live">LIVE (REAL MONEY)</option>
            </select>
            <input type="text" id="ALP_KEY" placeholder="API Key ID">
            <input type="password" id="ALP_SEC" placeholder="Secret Key">
            <button class="btn-primary" onclick="saveAlpaca()">CONNECT</button>
            <button class="btn-outline" onclick="closeAlpacaModal()">CANCEL</button>
        </div>
    </div>
</div>

<script>
/**
 * APEX ULTRA v5 CORE ENGINE
 */

const STATE = {
    pair: 'BTC/USD',
    watchlist: ['BTC/USD', 'ETH/USD', 'SOL/USD', 'AAPL', 'NVDA', 'TSLA', 'SPY', 'QQQ'],
    bars: [],
    scanner: {}, // Background data for all pairs
    isSniping: false,
    alpaca: { key: '', sec: '', mode: 'paper', connected: false },
    risk: { pct: 1.0, maxPos: 3 }
};

const UI = {
    mainCv: document.getElementById('MAIN_CV'),
    hub: document.getElementById('SCANNER_HUB'),
    toast: document.getElementById('TOAST')
};

// ─── INITIALIZATION ───
window.onload = () => {
    initChart();
    initWatchlist();
    loadStorage();
    startBackgroundScanner();
    requestAnimationFrame(renderLoop);
};

function initWatchlist() {
    const wrap = document.getElementById('TICKER_WRAP');
    wrap.innerHTML = '';
    STATE.watchlist.forEach(sym => {
        const div = document.createElement('div');
        div.className = `tick-pill ${sym === STATE.pair ? 'active' : ''}`;
        div.innerHTML = `<span class="tick-sym">${sym}</span><span class="tick-pr" id="pr_${sym.replace('/','_')}">---</span>`;
        div.onclick = () => switchPair(sym);
        wrap.appendChild(div);

        // Add to Scanner Hub
        const card = document.createElement('div');
        card.className = 'scan-card';
        card.id = `scan_${sym.replace('/','_')}`;
        card.innerHTML = `
            <div class="sym"><span>${sym}</span><span class="sig sig-neu" id="sig_${sym.replace('/','_')}">WAITING</span></div>
            <div style="font-size: 7px; color: var(--txt3)" id="stat_${sym.replace('/','_')}">SCANNING...</div>
        `;
        UI.hub.appendChild(card);
    });
}

// ─── BACKGROUND SCANNER (The Omni-Sniper Engine) ───
async function startBackgroundScanner() {
    // Scan every asset in watchlist every 15 seconds
    setInterval(async () => {
        for (const sym of STATE.watchlist) {
            await scanAsset(sym);
            if (STATE.isSniping) checkSnipeConditions(sym);
        }
    }, 15000);

    // Immediate first scan
    STATE.watchlist.forEach(scanAsset);
}

async function scanAsset(sym) {
    try {
        const bars = await fetchBars(sym, '1m', 50);
        if (!bars) return;
        
        const analysis = runAnalysis(bars);
        STATE.scanner[sym] = { bars, analysis };
        
        // Update UI
        const safeSym = sym.replace('/','_');
        const prEl = document.getElementById(`pr_${safeSym}`);
        if (prEl) prEl.textContent = bars[bars.length-1].c.toFixed(2);
        
        const sigEl = document.getElementById(`sig_${safeSym}`);
        if (sigEl) {
            sigEl.textContent = analysis.consensus;
            sigEl.className = `sig sig-${analysis.consensus.toLowerCase()}`;
        }

        if (sym === STATE.pair) {
            STATE.bars = bars;
            updateAgentUI(analysis);
        }
    } catch (e) {
        console.error("Scan error for " + sym, e);
    }
}

// ─── AI ANALYSIS ENGINE ───
function runAnalysis(bars) {
    const closes = bars.map(b => b.c);
    const last = closes[closes.length - 1];
    
    // Quick Technicals
    const rsi = calcRSI(closes, 14);
    const sma20 = calcSMA(closes, 20);
    const sma50 = calcSMA(closes, 50);
    
    // Agent Votes
    let score = 0;
    const agents = { mom: 'NEUTRAL', rev: 'NEUTRAL', trd: 'NEUTRAL' };

    // Momentum Agent
    if (rsi < 30) { agents.mom = 'BUY'; score++; }
    else if (rsi > 70) { agents.mom = 'SELL'; score--; }

    // Reversion Agent
    if (last < sma20 * 0.98) { agents.rev = 'BUY'; score++; }
    else if (last > sma20 * 1.02) { agents.rev = 'SELL'; score--; }

    // Trend Agent
    if (sma20 > sma50) { agents.trd = 'BUY'; score++; }
    else { agents.trd = 'SELL'; score--; }

    const consensus = score >= 2 ? 'BUY' : score <= -2 ? 'SELL' : 'NEUTRAL';
    
    return { consensus, agents, rsi, score };
}

// ─── SNIPER LOGIC ───
function toggleOmniSniper() {
    STATE.isSniping = !STATE.isSniping;
    const btn = document.getElementById('SNIPER_BTN');
    btn.textContent = STATE.isSniping ? '🛑 STOP SNIPING' : '🎯 START OMNI-SNIPER';
    btn.style.background = STATE.isSniping ? 'var(--bear)' : 'var(--blue)';
    
    showToast(`Omni-Sniper ${STATE.isSniping ? 'ARMED' : 'DISARMED'}`, STATE.isSniping ? 'bull' : 'bear');
}

async function checkSnipeConditions(sym) {
    const data = STATE.scanner[sym];
    if (!data || !STATE.alpaca.connected) return;

    if (data.analysis.consensus === 'BUY') {
        // Snipe!
        executeTrade(sym, 'buy');
    }
}

// ─── ALPACA EXECUTION ───
async function executeTrade(symbol, side) {
    if (!STATE.alpaca.connected) return;
    
    try {
        const base = STATE.alpaca.mode === 'paper' ? 'https://paper-api.alpaca.markets' : 'https://api.alpaca.markets';
        
        // Calculate dynamic quantity (Example: 1% of equity)
        // In a real app, fetch account equity first
        const qty = symbol.includes('/') ? "0.01" : "1"; 

        const body = {
            symbol: symbol.replace('/', ''),
            qty: qty,
            side: side,
            type: 'market',
            time_in_force: 'gtc'
        };

        const r = await fetch(`${base}/v2/orders`, {
            method: 'POST',
            headers: {
                'APCA-API-KEY-ID': STATE.alpaca.key,
                'APCA-API-SECRET-KEY': STATE.alpaca.sec,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });

        const res = await r.json();
        if (r.ok) {
            showToast(`🚀 SNIPED ${side.toUpperCase()} ${symbol}`, 'bull');
            // Stop sniping this asset for a while to avoid double entries
            delete STATE.scanner[symbol]; 
        } else {
            throw new Error(res.message);
        }
    } catch (e) {
        showToast(`Trade Failed: ${e.message}`, 'bear');
    }
}

// ─── UTILS & UI ───
function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = 'toast-msg';
    t.style.borderLeft = `4px solid var(--${type})`;
    t.innerHTML = msg;
    UI.toast.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

function updateAgentUI(analysis) {
    const update = (id, vote) => {
        const el = document.getElementById(id);
        const v = el.querySelector('.agent-vote');
        const f = el.querySelector('.agent-bar-fill');
        v.textContent = vote;
        v.className = `agent-vote sig-${vote.toLowerCase()}`;
        f.style.width = vote === 'BUY' ? '90%' : vote === 'SELL' ? '10%' : '50%';
        f.style.background = `var(--${vote.toLowerCase() === 'neu' ? 'txt3' : vote.toLowerCase()})`;
    };
    update('AG_MOM', analysis.agents.mom);
    update('AG_REV', analysis.agents.rev);
    update('AG_TRD', analysis.agents.trd);
}

// ─── DATA FETCHING (Polished) ───
async function fetchBars(sym, tf, limit) {
    // Primary: Binance for Crypto
    if (sym.includes('/')) {
        const bSym = sym.replace('/', '');
        try {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${bSym}&interval=${tf}&limit=${limit}`);
            const data = await r.json();
            return data.map(b => ({ t: b[0], o: +b[1], h: +b[2], l: +b[3], c: +b[4], v: +b[5] }));
        } catch(e) { return null; }
    }
    // Secondary: AlphaVantage/Yahoo proxy for Stocks (omitted for brevity, assume similar logic)
    return null; 
}

// ─── SIMPLE MATH ───
function calcRSI(closes, p) {
    if (closes.length < p) return 50;
    let up=0, dn=0;
    for(let i=1; i<=p; i++) {
        const d = closes[closes.length-i] - closes[closes.length-i-1];
        if(d>0) up+=d; else dn-=d;
    }
    return 100 - (100 / (1 + (up/dn)));
}
function calcSMA(data, p) {
    return data.slice(-p).reduce((a,b)=>a+b,0)/p;
}

// ─── CHARTING ENGINE (Optimized Render) ───
function initChart() {
    const resize = () => {
        const rect = UI.mainCv.parentElement.getBoundingClientRect();
        UI.mainCv.width = rect.width;
        UI.mainCv.height = rect.height;
    };
    window.onresize = resize;
    resize();
}

function renderLoop() {
    const ctx = UI.mainCv.getContext('2d');
    const W = UI.mainCv.width, H = UI.mainCv.height;
    ctx.clearRect(0,0,W,H);
    
    if (STATE.bars.length > 0) {
        // Draw Candles
        const bars = STATE.bars.slice(-60);
        const bw = W / bars.length;
        const maxH = Math.max(...bars.map(b => b.h));
        const minL = Math.min(...bars.map(b => b.l));
        const range = maxH - minL;

        bars.forEach((b, i) => {
            const x = i * bw + bw*0.1;
            const y_o = H - ((b.o - minL) / range) * H;
            const y_c = H - ((b.c - minL) / range) * H;
            const y_h = H - ((b.h - minL) / range) * H;
            const y_l = H - ((b.l - minL) / range) * H;

            ctx.strokeStyle = b.c >= b.o ? '#3fb950' : '#f85149';
            ctx.beginPath(); ctx.moveTo(x + bw*0.4, y_h); ctx.lineTo(x + bw*0.4, y_l); ctx.stroke();
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fillRect(x, Math.min(y_o, y_c), bw * 0.8, Math.max(0.5, Math.abs(y_o - y_c)));
        });
    }

    requestAnimationFrame(renderLoop);
}

function switchPair(sym) {
    STATE.pair = sym;
    document.getElementById('CHART_LBL').innerHTML = `${sym} <span style="font-size: 12px; color: var(--txt2); font-weight: 400;">1m</span>`;
    document.querySelectorAll('.tick-pill').forEach(p => p.classList.toggle('active', p.textContent.includes(sym)));
    scanAsset(sym);
}

// Alpaca Modals
function openAlpacaModal() { document.getElementById('ALPACA_MOD').style.display = 'flex'; }
function closeAlpacaModal() { document.getElementById('ALPACA_MOD').style.display = 'none'; }
function saveAlpaca() {
    STATE.alpaca.key = document.getElementById('ALP_KEY').value;
    STATE.alpaca.sec = document.getElementById('ALP_SEC').value;
    STATE.alpaca.mode = document.getElementById('ALP_MODE').value;
    STATE.alpaca.connected = true;
    document.getElementById('ALPACA_STATUS').textContent = 'CONNECTED';
    document.getElementById('ALPACA_STATUS').style.color = 'var(--bull)';
    closeAlpacaModal();
    showToast("Alpaca Linked Successfully", "bull");
}
function loadStorage() {
    // Load keys from localStorage if exists
}

</script>
</body>
</html>
