// ── Data fetching ───────────────────────────────────────────────
async function fetchBars() {
  // Binance first (most reliable public crypto source)
  try {
    const sym = app.symbol.replace('/', '');
    const tfMap = { '1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1D':'1d' };
    const url = `https://api.binance.com/api/v3/klines?symbol=${sym}USDT&interval=${tfMap[app.timeframe]}&limit=600`;
    const r = await fetch(url);
    if (r.ok) {
      const data = await r.json();
      const bars = data.map(d => ({t:+d[0], o:+d[1], h:+d[2], l:+d[3], c:+d[4], v:+d[5]}));
      if (bars.length > 50) {
        app.dataSource = 'Binance';
        return bars;
      }
    }
  } catch (e) {
    console.warn('Binance fetch failed', e);
  }

  // Synthetic fallback
  app.dataSource = 'Synthetic';
  return generateSyntheticBars(app.symbol, app.timeframe, 500);
}

function generateSyntheticBars(symbol, tf, count) {
  const bases = {
    'BTC/USD':92000, 'ETH/USD':3400, 'SOL/USD':180, 'DOGE/USD':0.22,
    'AAPL':235, 'NVDA':142, 'TSLA':420, 'SPY':595
  };
  const base = bases[symbol] || 100;
  const tfSec = { '1m':60, '5m':300, '15m':900, '1h':3600, '4h':14400, '1D':86400 }[tf] || 3600;
  const now = Date.now();
  const bars = [];
  let price = base * (0.88 + Math.random()*0.24);
  for (let i = count-1; i >= 0; i--) {
    price *= (1 + (Math.sin(i*0.03 + Date.now()*0.000001)*0.004) + (Math.random()-0.5)*0.009);
    const o = price;
    const c = price * (0.992 + Math.random()*0.016);
    const rng = Math.abs(c-o) * (0.5 + Math.random()*2.8);
    const h = Math.max(o,c) + rng * Math.random();
    const l = Math.min(o,c) - rng * Math.random();
    const v = base * 0.35 * (0.2 + Math.random()*3 + Math.abs(c-o)/o * 50);
    bars.push({t: now - i*tfSec*1000, o, h, l, c, v});
  }
  return bars.reverse();
}

  const TA = {

      let e = arr[0][k];
      for (let i = 1; i < arr.length; i++) e = arr[i][k] * kf + e * (1 - kf);

      let gain=0, loss=0;
      for (let i=1; i<=p; i++) {
        const d = arr[i].c - arr[i-1].c;

        gain = (gain*(p-1) + (d>0?d:0)) / p;
        loss = (loss*(p-1) + (d<0?-d:0)) / p;

    ctx.fillStyle = '#00050e'; ctx.fillRect(0,0,w,h);

    if (!app.candles.length) return;

    const visBars = Math.floor(w / 7);
    const start = Math.max(0, app.candles.length - visBars - app.scrollOffsetBars);
    const end   = Math.min(app.candles.length, start + visBars + 30);
    const view  = app.candles.slice(start, end);

    let lo = Infinity, hi = -Infinity;
    view.forEach(b => { lo = Math.min(lo, b.l); hi = Math.max(hi, b.h); });

    const pad = (hi - lo) * 0.08;
    lo -= pad; hi += pad;

    const yRange = hi - lo;
    const xStep = w / (view.length - 1);
    const yScale = h / yRange;

    const toX = i => i * xStep;
    const toY = p => h - (p - lo) * yScale;

    // grid
    ctx.strokeStyle = 'rgba(15,42,72,0.35)'; ctx.lineWidth=1;
    for (let i=0; i<=10; i++) {
      const y = i * (h/10);
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
    }

    // candles
    view.forEach((b,i) => {
      const x = toX(i);
      const isBull = b.c >= b.o;
      const top = toY(Math.max(b.o, b.c));
      const bot = toY(Math.min(b.o, b.c));
      ctx.strokeStyle = isBull ? var(--bull) : var(--bear);
      ctx.beginPath();
      ctx.moveTo(x, toY(b.h));
      ctx.lineTo(x, top);
      ctx.moveTo(x, bot);
      ctx.lineTo(x, toY(b.l));
      ctx.stroke();

      ctx.fillStyle = isBull ? var(--bull) : var(--bear);
      ctx.fillRect(x-4.5, top, 9, bot-top);
    });

    // EMA example
    if (app.showEMAs) {
      ctx.strokeStyle = '#00eaff'; ctx.lineWidth=1.6;
      ctx.beginPath(); let first=true;
      view.forEach((_,i) => {
        const ema = TA.ema(app.candles.slice(0, start+i+1), 21);
        const y = toY(ema);
        first ? ctx.moveTo(toX(i), y) : ctx.lineTo(toX(i), y);
        first = false;
      });
      ctx.stroke();
    }

    // ... expand here with:
    // - Bollinger Bands
    // - VWAP line
    // - Volume Profile (horizontal histogram on right)
    // - Fibonacci retracement from recent swing high/low
    // - Signal arrows / labels from app.signals
  }

    // ── UI Building Functions ─────────────────────────────────────
  function buildSymbolBar() {
    const bar = $('symbol-pills');
    bar.innerHTML = CONFIG.symbols.map(s => {
      const short = s.includes('/') ? s.split('/')[0] : s;
      const cls = s === app.symbol ? 'pill active' : 'pill';
      return `<button class="${cls}" data-symbol="${s}">${short}</button>`;
    }).join('');

    bar.addEventListener('click', e => {
      const btn = e.target.closest('.pill');
      if (!btn) return;
      app.symbol = btn.dataset.symbol;
      document.querySelectorAll('#symbol-pills .pill').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      refreshEverything();
      saveState();
    });
  }

  function buildTimeframeBar() {
    const bar = $('timeframe-pills');
    bar.innerHTML = CONFIG.timeframes.map(tf => {
      const cls = tf === app.timeframe ? 'pill active' : 'pill';
      return `<button class="${cls}" data-tf="${tf}">${tf}</button>`;
    }).join('');

    bar.addEventListener('click', e => {
      const btn = e.target.closest('.pill');
      if (!btn) return;
      app.timeframe = btn.dataset.tf;
      document.querySelectorAll('#timeframe-pills .pill').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      refreshEverything();
      saveState();
    });
  }

  function buildSniperPanel() {
    const panel = $('sniper-control-panel');
    panel.innerHTML = `
      <div class="pad-v-8 flex-between">
        <span style="color:var(--text-dim)">Status:</span>
        <span id="sniper-status" style="font-weight:700">${app.sniper.armed ? 'ARMED' : 'DISARMED'}</span>
      </div>
      <button id="sniper-toggle-btn" class="pill ${app.sniper.armed ? 'active' : ''}" style="width:100%; margin:8px 0;">
        ${app.sniper.armed ? 'DISARM SNIPER' : 'ARM SNIPER'}
      </button>
      <div class="pad-v-8 flex-between">
        <span>Mode:</span>
        <select id="sniper-mode-select">
          <option value="both" ${app.sniper.mode==='both'?'selected':''}>Both</option>
          <option value="long" ${app.sniper.mode==='long'?'selected':''}>Long only</option>
          <option value="short" ${app.sniper.mode==='short'?'selected':''}>Short only</option>
        </select>
      </div>
      <div class="pad-v-8 flex-between">
        <span>Min Conf:</span>
        <input type="number" id="sniper-minconf" value="${app.sniper.minConfidence}" min="50" max="99" style="width:60px">
      </div>
    `;

    $('sniper-toggle-btn').onclick = () => {
      app.sniper.armed = !app.sniper.armed;
      buildSniperPanel(); // refresh UI
      toast(app.sniper.armed ? 'Sniper ARMED' : 'Sniper DISARMED', app.sniper.armed ? 'sniper' : 'info');
      saveState();
    };

    $('sniper-mode-select').onchange = e => {
      app.sniper.mode = e.target.value;
      saveState();
    };

    $('sniper-minconf').onchange = e => {
      app.sniper.minConfidence = parseInt(e.target.value) || 76;
      saveState();
    };
  }

  // ── Resize & main loop ────────────────────────────────────────
  function onResize() {
    const cw = window.innerWidth - CONFIG.leftSidebarPx - CONFIG.rightSidebarPx;
    const ch = window.innerHeight - CONFIG.headerPx;

    const mainH = Math.floor(ch * 0.56);
    $('main-chart').width = cw; $('main-chart').height = mainH;
    $('volume-pane').width = cw; $('volume-pane').height = CONFIG.volPaneH;
    $('rsi-pane').width = cw; $('rsi-pane').height = CONFIG.rsiPaneH;
    $('macd-pane').width = cw; $('macd-pane').height = CONFIG.macdPaneH;

    $('volume-pane').style.top = mainH + 'px';
    $('rsi-pane').style.top   = (mainH + CONFIG.volPaneH) + 'px';
    $('macd-pane').style.top  = (mainH + CONFIG.volPaneH + CONFIG.rsiPaneH) + 'px';

    renderAllCanvases();
  }

    app.candles = await fetchBars();
